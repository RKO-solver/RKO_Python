site_name: RKO - Random-Key Optimizer
site_description: A Python library for Random-Key Optimization (RKO).
site_author: Felipe Silvestre Cardoso Roberto & João Assaoka
repo_url: https://github.com/RKO-solver/RKO_Python
repo_name: RKO-solver/RKO_Python

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true

nav:
  - Home: index.md
  - API Reference:
    - RKO: reference/rko.md
    - Environment: reference/environment.md
    - LogStrategy: reference/logstrategy.md
    - Plots: reference/plots.md
